    <script>
        document.getElementById('redirectForm').addEventListener('submit', function(e) {
            const gameType = document.getElementById('gameType').value;
            const accountData = document.getElementById('accountData').value.trim();
            
            if (!gameType) {
                alert('请选择游戏类型');
                e.preventDefault();
                return false;
            }
            
            if (!accountData) {
                alert('请输入账号数据');
                e.preventDefault();
                return false;
            }
            
            if (!accountData.includes('access_token') || !accountData.includes('openid')) {
                if (!confirm('输入的数据中未检测到access_token或openid，是否继续？')) {
                    e.preventDefault();
                    return false;
                }
            }
            
            return true;
        });
        
        // 添加简单的动画效果
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.querySelector('.container');
            container.style.opacity = 0;
            container.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                container.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                container.style.opacity = 1;
                container.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
